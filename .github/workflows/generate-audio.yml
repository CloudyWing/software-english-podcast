name: Generate Audio

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: '要轉換的 tag（如 v1.0.0）'
        required: true
        type: string

permissions:
  contents: write

jobs:
  generate-audio:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed transcripts
        id: changed
        run: |
          CURRENT_TAG="${{ github.event.inputs.tag || github.ref_name }}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${CURRENT_TAG}$" | head -n 1)

          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found. Converting all transcripts." >&2
            find transcripts -name "*.xml" > /tmp/changed_files.txt
          else
            echo "Comparing ${PREV_TAG}...${CURRENT_TAG}" >&2
            git diff --name-only "${PREV_TAG}...HEAD" -- 'transcripts/*.xml' > /tmp/changed_files.txt
          fi

          if [ -s /tmp/changed_files.txt ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Convert transcripts to MP3
        if: steps.changed.outputs.has_changes == 'true'
        id: convert
        env:
          TTS_KEY: ${{ secrets.TTS_KEY }}
          TTS_REGION: ${{ secrets.TTS_REGION }}
        run: |
          MAX_RETRY=3
          > /tmp/success_list.txt
          > /tmp/failed_list.txt

          while IFS= read -r FILE; do
            [ -z "$FILE" ] && continue
            ATTEMPT=0
            SUCCESS=false
            OUTPUT_FILE="$(basename "${FILE%.xml}.mp3")"

            while [ $ATTEMPT -lt $MAX_RETRY ]; do
              ATTEMPT=$((ATTEMPT + 1))
              echo "Converting $FILE (attempt $ATTEMPT/$MAX_RETRY)..."

              if pwsh scripts/Convert-Podcast.ps1 \
                -InputFile "$FILE" \
                -ApiKey "$TTS_KEY" \
                -Region "$TTS_REGION" \
                -OutputFile "$OUTPUT_FILE"; then
                SUCCESS=true
                echo "$OUTPUT_FILE" >> /tmp/success_list.txt
                break
              fi

              echo "Retry $ATTEMPT/$MAX_RETRY for $FILE"
              sleep 5
            done

            if [ "$SUCCESS" = false ]; then
              echo "$FILE" >> /tmp/failed_list.txt
            fi
          done < /tmp/changed_files.txt

          if [ -s /tmp/success_list.txt ]; then
            echo "has_success=true" >> $GITHUB_OUTPUT
          else
            echo "has_success=false" >> $GITHUB_OUTPUT
          fi

          if [ -s /tmp/failed_list.txt ]; then
            echo "has_failures=true" >> $GITHUB_OUTPUT
          else
            echo "has_failures=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload MP3 to Release
        if: steps.convert.outputs.has_success == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          while IFS= read -r MP3; do
            [ -z "$MP3" ] && continue
            echo "Uploading $MP3..."
            gh release upload "$TAG" "$MP3" --clobber
          done < /tmp/success_list.txt

      - name: Report failures
        if: steps.convert.outputs.has_failures == 'true'
        run: |
          echo "❌ The following files failed to convert after 3 retries:"
          cat /tmp/failed_list.txt
          exit 1
